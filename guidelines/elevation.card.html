<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft warm-tinted shadows" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-page); padding: 28px 22px; }
  .row { display:flex; gap:26px; align-items:center; }
  .c { text-align:center; }
  .b { width:96px; height:70px; background: var(--surface-card); border-radius: var(--radius-md); }
  .l { font:600 10px var(--font-mono); color:var(--text-muted); margin-top:12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="c"><div class="b" style="box-shadow:var(--shadow-xs)"></div><div class="l">xs</div></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-sm)"></div><div class="l">sm</div></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-md)"></div><div class="l">md</div></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-lg)"></div><div class="l">lg</div></div>
    <div class="c"><div class="b" style="box-shadow:var(--shadow-xl)"></div><div class="l">xl</div></div>
  </div>
</body>
</html>
