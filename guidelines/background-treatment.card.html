<!-- @dsCard group="Brand" viewport="700x200" name="Background Treatment" subtitle="Soft photographic depth + light wash" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); }
  .grid { display:flex; gap:0; }
  .tile { flex:1; height:200px; position:relative; overflow:hidden; }
  .ph { position:absolute; inset:0; background-size:cover; background-position:center; }
  .a { background-image:url('https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=800&q=60'); }
  .b { background-image:url('https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=800&q=60'); }
  .c { background-image:url('https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800&q=60'); }
  .blur { filter: blur(3px); transform: scale(1.1); }
  .wash { position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,247,240,.55)); }
  .cap { position:absolute; left:12px; bottom:10px; font:600 11px var(--font-mono); color:var(--neutral-800); background:var(--glass-white-strong); padding:4px 8px; border-radius:var(--radius-pill); backdrop-filter:blur(8px); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile"><div class="ph a"></div><div class="wash"></div><span class="cap">crisp</span></div>
    <div class="tile"><div class="ph b blur"></div><div class="wash"></div><span class="cap">blurred + drift</span></div>
    <div class="tile"><div class="ph c"></div><div class="wash"></div><span class="cap">warm wash</span></div>
  </div>
</body>
</html>
