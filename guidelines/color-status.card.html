<!-- @dsCard group="Colors" viewport="700x150" name="Status & Semantic" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); padding: 20px; }
  .row { display:flex; gap:14px; }
  .cell { flex:1; }
  .bar { height:54px; border-radius: var(--radius-sm); display:flex; align-items:center; padding-left:12px; color:#fff; font:600 13px var(--font-body); }
  .tint { height:24px; border-radius: 0 0 var(--radius-sm) var(--radius-sm); margin-top:-6px; padding-top:6px; }
  .lab { font:600 11px var(--font-mono); color:var(--text-muted); margin-top:8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="background:var(--success-500)">Success</div><div class="tint" style="background:var(--success-50)"></div><div class="lab">--success-500 / 50</div></div>
    <div class="cell"><div class="bar" style="background:var(--warning-500)">Warning</div><div class="tint" style="background:var(--warning-50)"></div><div class="lab">--warning-500 / 50</div></div>
    <div class="cell"><div class="bar" style="background:var(--danger-500)">Danger</div><div class="tint" style="background:var(--danger-50)"></div><div class="lab">--danger-500 / 50</div></div>
    <div class="cell"><div class="bar" style="background:var(--info-500)">Info</div><div class="tint" style="background:var(--info-50)"></div><div class="lab">--info-500 / 50</div></div>
  </div>
</body>
</html>
