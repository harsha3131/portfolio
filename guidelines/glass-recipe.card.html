<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); }
  .stage { position:relative; height:300px; overflow:hidden; }
  .photo { position:absolute; inset:0; background-size:cover; background-position:center;
    background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200&q=70'); }
  .wash { position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.25),rgba(255,247,240,.5)); }
  .wrap { position:absolute; inset:0; display:flex; gap:20px; align-items:center; justify-content:center; padding:24px; box-sizing:border-box; }
  .glass {
    width:300px; padding:24px;
    background: var(--glass-white);
    backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border:1px solid var(--glass-border);
    box-shadow: var(--shadow-glass);
    border-radius: var(--radius-md);
  }
  .glass.s {
    background: var(--glass-white-strong);
    backdrop-filter: var(--glass-blur-strong); -webkit-backdrop-filter: var(--glass-blur-strong);
    box-shadow: var(--shadow-glass-lg); border-radius: var(--radius-lg);
  }
  h3 { margin:0 0 6px; font: 700 20px var(--font-display); letter-spacing:-0.02em; color:var(--text-strong); }
  p { margin:0; font:400 14px/1.55 var(--font-body); color:var(--text-on-glass); }
  .lab { font:600 10px var(--font-mono); color:var(--neutral-600); margin-top:14px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="photo"></div>
    <div class="wash"></div>
    <div class="wrap">
      <div class="glass"><h3>Standard glass</h3><p>blur(18px) · 55% white · lit top edge.</p><div class="lab">.sh-glass</div></div>
      <div class="glass s"><h3>Strong glass</h3><p>blur(32px) · 72% white · larger elevation.</p><div class="lab">.sh-glass-strong</div></div>
    </div>
  </div>
</body>
</html>
