<!-- @dsCard group="Type" viewport="700x230" name="Display — Sora" subtitle="Headlines & hero type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); padding: 24px; color: var(--text-strong); }
  .eyebrow { font: 700 12px var(--font-body); letter-spacing: var(--tracking-caps); text-transform:uppercase; color: var(--text-accent); margin-bottom:10px; }
  .d1 { font: var(--weight-extra) 56px/1.05 var(--font-display); letter-spacing:-0.03em; margin:0; }
  .d2 { font: var(--weight-semibold) 30px/1.1 var(--font-display); letter-spacing:-0.02em; margin:14px 0 0; color: var(--text-body); }
  .lab { font:600 11px var(--font-mono); color:var(--text-muted); margin-top:14px; }
</style>
</head>
<body>
  <div class="eyebrow">Your work, framed</div>
  <h1 class="d1">A portfolio that<br>feels like glass.</h1>
  <div class="d2">Section heading in Sora Semibold</div>
  <div class="lab">Sora · 800 / 600 · tracking −0.03em</div>
</body>
</html>
