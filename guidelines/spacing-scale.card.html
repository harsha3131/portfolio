<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); padding: 22px; }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .c { text-align:center; }
  .b { background: var(--grad-sunset); border-radius: 4px; width:28px; }
  .l { font:600 10px var(--font-mono); color:var(--text-muted); margin-top:6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="c"><div class="b" style="height:8px"></div><div class="l">2·8</div></div>
    <div class="c"><div class="b" style="height:12px"></div><div class="l">3·12</div></div>
    <div class="c"><div class="b" style="height:16px"></div><div class="l">4·16</div></div>
    <div class="c"><div class="b" style="height:24px"></div><div class="l">6·24</div></div>
    <div class="c"><div class="b" style="height:32px"></div><div class="l">8·32</div></div>
    <div class="c"><div class="b" style="height:48px"></div><div class="l">12·48</div></div>
    <div class="c"><div class="b" style="height:64px"></div><div class="l">16·64</div></div>
    <div class="c"><div class="b" style="height:80px"></div><div class="l">20·80</div></div>
  </div>
</body>
</html>
