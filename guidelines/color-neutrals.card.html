<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Warm-tinted slate, never pure gray" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); padding: 20px; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:84px; border-radius: var(--radius-sm); display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; border:1px solid var(--border-subtle); }
  .sw span { font: 600 11px var(--font-mono); }
  .light span { color: var(--neutral-700); }
  .dk span { color:#fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--neutral-0)"><span>0</span></div>
    <div class="sw light" style="background:var(--neutral-50)"><span>50</span></div>
    <div class="sw light" style="background:var(--neutral-100)"><span>100</span></div>
    <div class="sw light" style="background:var(--neutral-200)"><span>200</span></div>
    <div class="sw light" style="background:var(--neutral-300)"><span>300</span></div>
    <div class="sw light" style="background:var(--neutral-400)"><span>400</span></div>
    <div class="sw dk" style="background:var(--neutral-500)"><span>500</span></div>
    <div class="sw dk" style="background:var(--neutral-700)"><span>700</span></div>
    <div class="sw dk" style="background:var(--neutral-900)"><span>900</span></div>
  </div>
</body>
</html>
