<!-- @dsCard group="Type" viewport="700x260" name="Type Scale" subtitle="2xs → 5xl, 1.25 ratio" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface-card); padding: 22px; color: var(--text-strong); }
  .r { display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px solid var(--border-subtle); }
  .r:last-child { border:0; }
  .t { font-family: var(--font-display); font-weight:700; letter-spacing:-0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m { font:600 11px var(--font-mono); color:var(--text-muted); margin-left:auto; white-space:nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:48px">Aa Portfolio</span><span class="m">5xl · 64 / used 48</span></div>
  <div class="r"><span class="t" style="font-size:36px">Aa Portfolio</span><span class="m">3xl · 36</span></div>
  <div class="r"><span class="t" style="font-size:28px">Aa Portfolio</span><span class="m">2xl · 28</span></div>
  <div class="r"><span class="t" style="font-size:22px">Aa Portfolio</span><span class="m">xl · 22</span></div>
  <div class="r"><span class="t" style="font-size:16px">Aa Portfolio</span><span class="m">md · 16 base</span></div>
  <div class="r"><span class="t" style="font-size:12px">Aa Portfolio</span><span class="m">xs · 12</span></div>
</body>
</html>
