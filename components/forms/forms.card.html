<!-- @dsCard group="Components" viewport="700x300" name="Forms — Input & IconButton" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { margin:0; font-family: var(--font-body); position:relative; min-height:300px; overflow:hidden; }
  .bg { position:absolute; inset:0; background:url('https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=1200&q=60') center/cover; }
  .wash { position:absolute; inset:0; background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(255,247,240,.65)); }
  .wrap { position:relative; padding:24px; display:flex; gap:18px; align-items:flex-start; }
  .panel { flex:1; background:var(--glass-white-strong); backdrop-filter:var(--glass-blur); border:1px solid var(--glass-border); border-radius:var(--radius-lg); box-shadow:var(--shadow-glass); padding:20px; }
  .lbl { font:600 11px var(--font-mono); color:var(--text-muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:14px; }
  .stack { display:flex; flex-direction:column; gap:14px; }
  .row { display:flex; gap:12px; align-items:center; }
</style>
</head>
<body>
  <div class="bg"></div><div class="wash"></div>
  <div class="wrap">
    <div class="panel" style="flex:1.4"><div class="lbl">Inputs</div><div class="stack" id="inputs"></div></div>
    <div class="panel"><div class="lbl">Icon buttons</div><div class="row" id="icons"></div></div>
  </div>

  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const { Input, IconButton } = window.SriHarshaPortfolioDesignSystem_04f779;
    const ic = (n) => <i data-lucide={n} style={{width:18,height:18}}></i>;
    ReactDOM.createRoot(document.getElementById('inputs')).render(<>
      <Input label="Project title" placeholder="My portfolio" />
      <Input label="Email" iconLeft={ic('mail')} placeholder="you@studio.com" hint="Never shared." />
      <Input label="Custom slug" value="jane-doe" error="Already taken" onChange={()=>{}} />
    </>);
    ReactDOM.createRoot(document.getElementById('icons')).render(<>
      <IconButton label="Share">{ic('share-2')}</IconButton>
      <IconButton label="Like" variant="solid">{ic('heart')}</IconButton>
      <IconButton label="More" variant="ghost">{ic('more-horizontal')}</IconButton>
      <IconButton label="Add" round={false}>{ic('plus')}</IconButton>
    </>);
    setTimeout(()=>window.lucide&&window.lucide.createIcons(), 60);
  </script>
</body>
</html>
